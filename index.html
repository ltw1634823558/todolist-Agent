<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - 任务管理</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="todo-app">
            <div class="header">
                <h1><i class="fas fa-check-circle"></i> Todo List</h1>
                <p class="subtitle">高效管理你的每一天</p>
            </div>

            <div class="input-container">
                <input type="text" id="todoInput" placeholder="添加新任务..." autocomplete="off">
                <button id="addBtn" class="add-btn">
                    <i class="fas fa-plus"></i>
                </button>
            </div>

            <div class="filter-container">
                <button class="filter-btn active" data-filter="all">全部</button>
                <button class="filter-btn" data-filter="pending">待完成</button>
                <button class="filter-btn" data-filter="completed">已完成</button>
            </div>

            <div class="stats-container">
                <div class="stat">
                    <span class="stat-number" id="totalTasks">0</span>
                    <span class="stat-label">总任务</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="pendingTasks">0</span>
                    <span class="stat-label">待完成</span>
                </div>
                <div class="stat">
                    <span class="stat-number" id="completedTasks">0</span>
                    <span class="stat-label">已完成</span>
                </div>
            </div>

            <ul id="todoList" class="todo-list"></ul>

            <div class="empty-state" id="emptyState">
                <i class="fas fa-clipboard-list"></i>
                <p>暂无任务，开始添加吧！</p>
            </div>

            <div class="footer">
                <button id="clearCompleted" class="clear-btn">
                    <i class="fas fa-trash-alt"></i> 清除已完成
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
